name: vendorboss_app
description: "VendorBoss - TCG Vendor Sales & Inventory Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0

  # State Management
  provider: ^6.1.2

  # Networking
  http: ^1.2.2
  connectivity_plus: ^6.0.3

  # Local Storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Camera & Scanning
  camera: ^0.10.5+5
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  mobile_scanner: ^5.2.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2

  # PDF & Printing
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
